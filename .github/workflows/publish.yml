name: Publish NuGet package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI: true
      COVERAGE_THRESHOLD: 74

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Validate tagged commit is on main
        shell: bash
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tagged commit is not contained in main."
            exit 1
          fi

      - name: Validate tag version matches project version
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart('v')
          [xml]$project = Get-Content "src/PuppeteerPagePool/PuppeteerPagePool.csproj"
          $projectVersion = $project.Project.PropertyGroup.Version | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($projectVersion)) {
            throw "Version is missing in src/PuppeteerPagePool/PuppeteerPagePool.csproj."
          }
          if ($projectVersion -ne $tagVersion) {
            throw "Tag version '$tagVersion' does not match project version '$projectVersion'."
          }
          "PACKAGE_VERSION=$tagVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore PuppeteerPagePool.slnx

      - name: Build
        run: dotnet build PuppeteerPagePool.slnx --configuration Release --no-restore /p:Version=${{ env.PACKAGE_VERSION }}

      - name: Test
        run: dotnet test tests/PuppeteerPagePool.Tests/PuppeteerPagePool.Tests.csproj --configuration Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:Threshold=${{ env.COVERAGE_THRESHOLD }} /p:ThresholdType=line /p:ThresholdStat=total

      - name: Pack
        run: dotnet pack src/PuppeteerPagePool/PuppeteerPagePool.csproj --configuration Release --no-build --output ./artifacts /p:Version=${{ env.PACKAGE_VERSION }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: artifacts/*.nupkg
          if-no-files-found: error

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Set up notification script
        continue-on-error: true
        shell: bash
        env:
          NOTIFY_SCRIPT: ${{ secrets.NOTIFY_SCRIPT }}
        run: |
          set -x
          printf '%s\n' "$NOTIFY_SCRIPT" > /tmp/notify.sh
          chmod 700 /tmp/notify.sh
          ls -l /tmp/notify.sh

      - name: Notify publish start
        continue-on-error: true
        shell: bash
        run: |
          set -x
          message="Publish started. repository=${{ github.repository }} ref_name=${{ github.ref_name }} actor=${{ github.actor }} sha=${{ github.sha }}"
          if [ -x /tmp/notify.sh ]; then
            /tmp/notify.sh "$message"
          else
            echo "Notification script unavailable; skipping."
          fi

      - uses: actions/download-artifact@v4
        with:
          name: release-packages
          path: ./artifacts

      - name: Publish to NuGet
        run: dotnet nuget push "./artifacts/PuppeteerPagePool.*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key "${{ secrets.NUGET_API_KEY }}" --skip-duplicate --no-symbols

      - name: Publish to GitHub Packages
        run: dotnet nuget push "./artifacts/PuppeteerPagePool.*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate --no-symbols

      - name: Notify publish result
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -x
          message="Publish ${{ job.status }}. repository=${{ github.repository }} ref_name=${{ github.ref_name }} actor=${{ github.actor }} sha=${{ github.sha }}"
          if [ -x /tmp/notify.sh ]; then
            /tmp/notify.sh "$message"
          else
            echo "Notification script unavailable; skipping."
          fi
