name: Build and publish NuGet package

on:
  push:
    branches:
      - production

permissions:
  contents: read

jobs:
  build-test-pack-publish:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore PuppeteerPagePool.slnx

      - name: Build
        run: dotnet build PuppeteerPagePool.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test PuppeteerPagePool.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/PuppeteerPagePool/PuppeteerPagePool.csproj --configuration Release --no-build --output ./artifacts

      - name: Publish to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key "${{ secrets.NUGET_API_KEY }}" --skip-duplicate
