name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      CI: true
      COVERAGE_THRESHOLD: 74

    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore PuppeteerPagePool.slnx

      - name: Build
        run: dotnet build PuppeteerPagePool.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/PuppeteerPagePool.Tests/PuppeteerPagePool.Tests.csproj --configuration Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:Threshold=${{ env.COVERAGE_THRESHOLD }} /p:ThresholdType=line /p:ThresholdStat=total

      - name: Notify CI failure
        if: failure()
        continue-on-error: true
        shell: bash
        env:
          NOTIFY_SCRIPT: ${{ secrets.NOTIFY_SCRIPT }}
        run: |
          message="CI failed. repository=${{ github.repository }} ref_name=${{ github.ref_name }} actor=${{ github.actor }} sha=${{ github.sha }}"
          if [ -n "$NOTIFY_SCRIPT" ]; then
            printf '%s\n' "$NOTIFY_SCRIPT" > /tmp/notify.sh
            chmod 700 /tmp/notify.sh
            /tmp/notify.sh "$message"
          else
            echo "Notification script unavailable; skipping."
          fi
